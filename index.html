<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Maestro Barberia</title>
    <meta name="theme-color" content="#C9A876" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Maestro" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Boot splash, inlined on purpose.
         Everything below paints on the first frame, before the JS bundle is
         fetched or parsed — otherwise the user stares at a white screen for
         the whole download. Must stay self-contained: styles.css has not
         loaded at this point, so no CSS variables and no external assets.
         Visually identical to .loading-emblem in src/styles.css, which takes
         over once React mounts. Change both together. -->
    <style>
      #boot-splash {
        position: fixed;
        z-index: 9999;
        display: grid;
        overflow: hidden;
        inset: 0;
        place-items: center;
        background:
          radial-gradient(circle at 50% 48%, rgba(184, 137, 46, 0.16), transparent 32%),
          #f5f3ef;
        transition: opacity 0.25s ease-out;
      }

      #boot-splash.is-done {
        opacity: 0;
        pointer-events: none;
      }

      #boot-splash .bs-emblem {
        position: relative;
        width: 92px;
        height: 92px;
        perspective: 620px;
      }

      #boot-splash .bs-coin {
        position: relative;
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        animation: bs-flip 3.2s cubic-bezier(0.55, 0, 0.35, 1) infinite;
      }

      #boot-splash .bs-face {
        position: absolute;
        display: grid;
        overflow: hidden;
        inset: 0;
        place-items: center;
        border-radius: 50%;
        background: linear-gradient(140deg, #f0d49b 0%, #c99a3c 34%, #96701f 58%, #e2c084 78%, #ab8028 100%);
        box-shadow:
          inset 0 0 0 3px rgba(255, 255, 255, 0.32),
          inset 0 -8px 16px rgba(90, 66, 20, 0.4),
          0 12px 26px rgba(184, 137, 46, 0.34);
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 38px;
        font-weight: 850;
        letter-spacing: -1px;
        backface-visibility: hidden;
      }

      #boot-splash .bs-face::after {
        position: absolute;
        top: -60%;
        left: -120%;
        width: 60%;
        height: 220%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.75), transparent);
        content: "";
        transform: rotate(18deg);
        animation: bs-sheen 3.2s ease-in-out infinite;
      }

      #boot-splash .bs-back {
        transform: rotateY(180deg);
      }

      #boot-splash .bs-emblem::after {
        position: absolute;
        bottom: -16px;
        left: 50%;
        width: 62px;
        height: 9px;
        border-radius: 50%;
        background: rgba(90, 66, 20, 0.22);
        content: "";
        transform: translateX(-50%);
        filter: blur(7px);
        animation: bs-shadow 3.2s ease-in-out infinite;
      }

      @keyframes bs-flip {
        0%, 12% { transform: rotateY(0deg); }
        50%, 62% { transform: rotateY(180deg); }
        100% { transform: rotateY(360deg); }
      }

      @keyframes bs-sheen {
        0%, 55% { left: -120%; }
        80%, 100% { left: 180%; }
      }

      @keyframes bs-shadow {
        0%, 12% { opacity: 0.22; transform: translateX(-50%) scaleX(1); }
        50%, 62% { opacity: 0.12; transform: translateX(-50%) scaleX(0.35); }
        100% { opacity: 0.22; transform: translateX(-50%) scaleX(1); }
      }

      @media (prefers-reduced-motion: reduce) {
        #boot-splash .bs-coin,
        #boot-splash .bs-face::after,
        #boot-splash .bs-emblem::after {
          animation: none;
        }

        #boot-splash .bs-face::after {
          left: -120%;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" role="status" aria-label="Загрузка">
      <div class="bs-emblem" aria-hidden="true">
        <div class="bs-coin">
          <div class="bs-face">M</div>
          <div class="bs-face bs-back">
            <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round">
              <circle cx="6" cy="18" r="3" />
              <circle cx="18" cy="18" r="3" />
              <path d="M8.1 15.9 20 4M15.9 15.9 4 4" />
            </svg>
          </div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
